<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>校园答疑助手</title><link rel="stylesheet" href="styles.css"><style>.wechat-btn{border:0;background:#2d6a4f;color:#fff;padding:10px 16px;border-radius:8px;cursor:pointer}.notice-panel,.quick-panel{margin:0 0 18px;background:#fff;border:1px solid #e5e9ef;border-radius:18px;overflow:hidden}.notice-toggle,.quick-toggle{width:100%;display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border:0;background:#fff;color:#27384a;font:600 15px inherit;cursor:pointer}.notice-toggle span:last-child,.quick-toggle span:last-child{font-size:20px;color:#8a99a8;transition:.2s}.notice-panel.collapsed .notice-toggle span:last-child,.quick-panel.collapsed .quick-toggle span:last-child{transform:rotate(-90deg)}.notice-content{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 14px 14px}.notice-panel.collapsed .notice-content,.quick-panel.collapsed #quickGrid{display:none}.promo-card{min-height:100px;border:1px solid #edf0f4;border-radius:14px;padding:16px;background:#fbfcfe}.promo-card strong{display:block;color:#1689e8;margin-bottom:8px}.promo-card p{margin:0;color:#7d8996;font-size:13px;line-height:1.6}.quick-panel{margin-bottom:0}.quick-panel #quickGrid{display:flex;gap:9px;overflow-x:auto;white-space:nowrap;padding:0 14px 14px;scrollbar-width:none}.quick-panel #quickGrid::-webkit-scrollbar{display:none}.quick-panel #quickGrid button{flex:0 0 auto}.modal{display:none;position:fixed;inset:0;background:#18233499;place-items:center;z-index:10}.modal.open{display:grid}.modal-card{position:relative;background:#fff;padding:26px;border-radius:16px;text-align:center;min-width:280px}.modal-card img{width:220px;height:220px;object-fit:contain;background:#f5f5f5;border-radius:8px}.modal-card p{color:#9aa5b2}.close{position:absolute;right:12px;top:8px;border:0;background:none;font-size:28px;color:#7b8794;cursor:pointer}</style></head><body><main class="app"><header><div class="brand"><div class="avatar">学</div><div><h1>学长</h1><p>新生专属答疑助手</p></div></div><button class="wechat-btn" id="wechatBtn">添加学长微信</button></header><section class="notice-panel" id="noticePanel"><button class="notice-toggle" id="noticeToggle"><span>校园推荐</span><span>⌃</span></button><div class="notice-content"><article class="promo-card"><strong>校园表白墙投稿</strong><p>分享校园生活，认识更多同学，欢迎投稿交流。</p></article><article class="promo-card"><strong>校园生活指南</strong><p>查看校园资讯、活动和新生实用信息。</p></article></div></section><section class="layout"><div class="chat-card"><div class="chat-head"><div><strong>在线问答</strong><span>知识库增强回答</span></div></div><div id="messages" class="messages"><div class="message assistant">你好呀，我是你的新生学长。可以问我报到材料、宿舍、军训、转专业等问题～</div></div><section class="quick-panel" id="quickPanel"><button class="quick-toggle" id="quickToggle"><span>快捷提问</span><span>⌃</span></button><div class="quick" id="quickGrid"></div></section><div class="composer"><textarea id="question" rows="1" placeholder="输入你的问题…"></textarea><button id="sendBtn">发送</button></div><small class="disclaimer">AI 回答仅供参考，具体信息请以学校官方通知为准</small></div><aside class="info-card"><h3>咨询方式</h3><div class="contact">☎ <span>咨询电话<strong>400-000-0000</strong></span></div><div class="contact">◉ <span>学长微信<strong>点击右上角添加</strong></span></div></aside></section></main><div id="qrModal" class="modal"><div class="modal-card"><button id="closeModal" class="close">×</button><h3>添加学长微信</h3><img id="qrImage" alt="学长微信二维码"><p id="qrEmpty">管理员还没有配置二维码</p></div></div><script src="app.js"></script></body></html>

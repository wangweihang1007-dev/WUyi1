<!doctype html><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>管理员登录</title><style>body{font-family:system-ui,'Microsoft YaHei';background:#f5efe4;display:grid;place-items:center;min-height:100vh;margin:0}.box{background:#fffdf8;padding:32px;border-radius:12px;width:min(340px,calc(100% - 40px));box-shadow:0 10px 30px #8b7e6a33}h1{font-size:22px;color:#2d6a4f}input,button{width:100%;padding:12px;margin:7px 0;border-radius:6px;font:inherit;box-sizing:border-box}input{border:1px solid #c9b99a}button{border:0;background:#2d6a4f;color:#fff;cursor:pointer}.error{color:#c44;font-size:13px}</style><div class="box"><h1>校园答疑助手</h1><p>管理员登录</p><form id="form"><input id="user" placeholder="账号" autocomplete="username"><input id="pass" type="password" placeholder="密码" autocomplete="current-password"><button>登录</button><div id="error" class="error"></div></form></div><script>form.onsubmit=async e=>{e.preventDefault();let r=await fetch('/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:user.value,password:pass.value})});if(r.ok)location.href='/';else error.textContent='账号或密码错误'}</script>

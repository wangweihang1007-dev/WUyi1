<!doctype html><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>答疑助手管理后台</title><style>body{font-family:system-ui,'Microsoft YaHei';max-width:900px;margin:auto;padding:24px;background:#f5efe4;color:#3d3427}.card{background:#fffdf8;padding:24px;margin:16px 0;border:1px solid #c9b99a;border-radius:10px}h1{color:#2d6a4f}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}label{display:grid;gap:6px;font-size:13px}.full{grid-column:1/-1}input,textarea,select{padding:10px;border:1px solid #c9b99a;background:#fffdf8;border-radius:6px;font:inherit}.preview{width:180px;height:100px;object-fit:cover;border:1px dashed #c9b99a;margin-top:8px;border-radius:6px}button{background:#2d6a4f;color:#fff;border:0;padding:10px 18px;border-radius:6px;margin-top:16px;cursor:pointer}.status{color:#2d6a4f}@media(max-width:650px){.grid{grid-template-columns:1fr}.full{grid-column:auto}}</style><h1>校园答疑助手 · 管理后台</h1><p><a href="http://localhost:3000/">打开用户端</a>　<a href="/api/health">服务状态</a></p><section class="card"><h2>模型与品牌配置</h2><div class="grid"><label>学校名称<input id="schoolName"></label><label>助手名称<input id="assistantName"></label><label>助手副标题<input id="assistantSubtitle"></label><label>咨询电话<input id="phone"></label><label>模型<select id="model"><option>glm-4-flash</option><option>glm-4-plus</option><option>glm-4-air</option></select></label><label>智谱 API Key<input id="apiKey" type="password" placeholder="sk-..."></label><label>在线问答背景<input id="bgFile" type="file" accept="image/*"><img id="bgPreview" class="preview"></label><label>微信二维码<input id="qrFile" type="file" accept="image/*"><img id="qrPreview" class="preview"></label></div><button id="saveBase">保存基础配置</button><span id="savedBase" class="status"></span></section><section class="card"><h2>校园推荐内容</h2><div class="grid"><label>卡片1标题<input id="promoTitle1"></label><label>卡片2标题<input id="promoTitle2"></label><label>卡片1描述<textarea id="promoDesc1"></textarea></label><label>卡片2描述<textarea id="promoDesc2"></textarea></label><label>卡片1图片上传<input id="promo1" type="file" accept="image/*"><img id="promoPreview1" class="preview"></label><label>卡片2图片上传<input id="promo2" type="file" accept="image/*"><img id="promoPreview2" class="preview"></label></div><button id="savePromo">保存校园推荐</button><span id="savedPromo" class="status"></span></section><section class="card"><h2>知识库资料</h2><input id="files" type="file" multiple><button id="upload">上传并索引</button><p id="uploadStatus" class="status"></p><div id="docs"></div></section><script>let c={};const base=['schoolName','assistantName','assistantSubtitle','phone','model','apiKey'];const promo=['promoTitle1','promoTitle2','promoDesc1','promoDesc2'];async function load(){c=await(await fetch('/api/admin/config')).json();[...base,...promo].forEach(id=>document.getElementById(id).value=id==='apiKey'&&c.apiKey==='已配置'?'':c[id]||'');[['bgFile','bgPreview','chatBackground'],['qrFile','qrPreview','qrCode'],['promo1','promoPreview1','promoImage1'],['promo2','promoPreview2','promoImage2']].forEach(([i,p,k])=>{if(c[k])document.getElementById(p).src=c[k];document.getElementById(i).onchange=()=>{let f=document.getElementById(i).files[0];if(!f)return;let r=new FileReader;r.onload=()=>{c[k]=r.result;document.getElementById(p).src=r.result};r.readAsDataURL(f)}});let d=await(await fetch('/api/documents')).json();docs.innerHTML=d.documents.map(x=>`<p>${x.name}　${x.indexed?'已索引':'待解析'}</p>`).join('')||'暂无资料'}async function saveFields(fields,status){fields.forEach(id=>{let v=document.getElementById(id).value;if(id!=='apiKey'||v)c[id]=v});await fetch('/api/admin/config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(c)});document.getElementById(status).textContent='已保存'}saveBase.onclick=()=>saveFields(base,'savedBase');savePromo.onclick=()=>saveFields(promo,'savedPromo');upload.onclick=async()=>{for(const f of files.files){let d=await new Promise((a,b)=>{let r=new FileReader;r.onload=()=>a(r.result.split(',')[1]);r.onerror=b;r.readAsDataURL(f)});await fetch('/api/upload',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:f.name,data:d})})}uploadStatus.textContent='上传完成';load()};load()</script>
